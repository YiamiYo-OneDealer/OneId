name: CI

on:
  workflow_dispatch: # temporarily disabled auto-triggers while POC is in progress

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build OneId.slnx -c Release

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Test
        run: dotnet test OneId.slnx -c Release
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  migration-bundle:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.0.8
      - name: Generate migration bundle
        run: |
          dotnet ef migrations bundle \
            --project src/OneId.Server \
            --startup-project src/OneId.Server \
            --output efbundle \
            --self-contained \
            --runtime linux-x64
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: efbundle
          path: efbundle

  migration-validate:
    needs: migration-bundle
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oneid_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: efbundle
          path: .
      - name: Apply migration bundle
        run: |
          chmod +x ./efbundle
          ./efbundle --connection "Host=localhost;Port=5432;Database=oneid_ci;Username=postgres;Password=postgres"
      - name: Verify schema is queryable
        run: |
          psql -h localhost -U postgres -d oneid_ci -c "
            SELECT COUNT(*) FROM information_schema.tables
            WHERE table_schema = 'public'
            AND table_name IN ('tenants', 'users');
          " | grep -q '2'
        env:
          PGPASSWORD: postgres

  vitest-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: src/OneId.Web
      - name: Run vitest
        run: npm test -- --run
        working-directory: src/OneId.Web

  playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: src/OneId.Web
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: src/OneId.Web
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: src/OneId.Web
        env:
          CI: 'true'
